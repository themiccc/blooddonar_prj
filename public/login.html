<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Login | LifeLine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Navigation Bar -->
  <div id="navbar-placeholder"></div>

  <section class="container" style="padding: 100px 0; display: flex; justify-content: center;">
    <div class="glass-card" style="max-width: 440px; width: 100%;">
      <div style="text-align: center; margin-bottom: 32px;">
        <h2 style="font-size: 2rem; margin-bottom: 8px;">Donor <span class="gradient-text">Login</span></h2>
        <p style="color: var(--text-muted);">Welcome back. Sign in to update availability and view local requests.</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; padding: 14px;">Sign In</button>
      </form>

      <p style="text-align: center; margin-top: 24px; color: var(--text-muted);">
        Don't have a donor profile? <a href="register.html" style="color: var(--primary); font-weight: 600;">Register Here</a>
      </p>
    </div>
  </section>

  <!-- Dynamic Footer Section -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
